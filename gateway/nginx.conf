worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # DNS resolver for upstream lookups (works with Docker's internal DNS)
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # ── Upstream Services (correct ports match docker-compose services) ─────────
    upstream auth_service {
        server auth-service:8081;
        keepalive 32;
    }
    upstream product_service {
        server product-service:8082;
        keepalive 32;
    }
    # upstream search_service {
    #     server search-service:8083;
    #     keepalive 32;
    # }
    upstream promotion_service {
        server promotion-service:8084;
        keepalive 32;
    }
    upstream coupon_service {
        server coupon-service:8085;
        keepalive 32;
    }
    upstream order_service {
        server order-service:8087;
        keepalive 32;
    }
    upstream payment_service {
        server payment-service:8086;
        keepalive 32;
    }
    upstream cart_service {
        server cart-service:8088;
        keepalive 32;
    }
    upstream review_service {
        server review-service:8089;
        keepalive 32;
    }
    upstream notification_service {
        server notification-service:8090;
        keepalive 32;
    }

    # ── Main Server Block ──────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # ── Health Check ───────────────────────────────────────────────────────
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
            access_log off;
        }

        # ── Internal JWT Verification ──────────────────────────────────────────
        # Gateway calls this to verify JWT before proxying to protected services
        # Authorization header is forwarded; auth-service returns 200 or 401
        location = /_auth_check {
            internal;
            proxy_pass http://auth_service/internal/auth/verify;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Error page for auth failures
        error_page 401 = @auth_failed;
        location @auth_failed {
            return 401 '{"success":false,"message":"Unauthorized"}';
            add_header Content-Type application/json;
        }

        # ── Auth Service ───────────────────────────────────────────────────────
        location ^~ /api/auth {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location ^~ /api/locations {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Profile (Protected) ────────────────────────────────────────────────
        location ^~ /api/profile {
            auth_request /_auth_check;
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
        }

