version: '3.8'

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tekno_auth_service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URI=postgresql://postgres:1@postgres_db:5432/auth_db
      - JWT_SECRET=67948303ff68727a66d36abd88ce6d248bf9bf7c4f4ad98c7b89d84fc71019b0
      - JWT_REFRESH_SECRET=6b89ddaabd0476a190aec107bf9a1ce861520718bf45102fcd83ae84289e7917
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8080
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:15-alpine
    container_name: tekno_postgres
    env_file:
      - .env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-data.sql:/docker-entrypoint-initdb.d/init-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: