spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USER:tekno}
    password: ${DB_PASSWORD:tekno123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tekno}
    password: ${RABBITMQ_PASSWORD:tekno123}

server:
  port: ${PORT:8086}

# External service integration
payment:
  external:
    order:
      base-url: ${PAYMENT_EXTERNAL_ORDER_BASE_URL:http://localhost:8087}
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
  simulator:
    vnpay:
      failure-rate: 0.0
      processing-delay-ms: 0
    momo:
      failure-rate: 0.0
      processing-delay-ms: 0
    zalopay:
      failure-rate: 0.0
      processing-delay-ms: 0
    paypal:
      failure-rate: 0.0
      processing-delay-ms: 0
    stripe:
      failure-rate: 0.0
      processing-delay-ms: 0
  timeout:
    default-minutes: 15
    sweep-interval-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.uit.paymentservice: INFO
