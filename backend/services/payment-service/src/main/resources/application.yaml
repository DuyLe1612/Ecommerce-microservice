spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: tekno
    password: tekno123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8086

payment:
  external:
    auth:
      mode: mock
      base-url: http://auth-service:8081
      jwt-secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-minimum-32-chars}
    order:
      mode: mock
      base-url: http://order-service:8082
  simulator:
    vnpay:
      failure-rate: 0.1
      processing-delay-ms: 200
    momo:
      failure-rate: 0.05
      processing-delay-ms: 150
    zalopay:
      failure-rate: 0.08
      processing-delay-ms: 180
    paypal:
      failure-rate: 0.03
      processing-delay-ms: 300
    stripe:
      failure-rate: 0.02
      processing-delay-ms: 100
  timeout:
    default-minutes: 15
    sweep-interval-ms: 60000

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

logging:
  level:
    com.uit.paymentservice: DEBUG
