spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USER:tekno}
    password: ${DB_PASSWORD:tekno123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tekno}
    password: ${RABBITMQ_PASSWORD:tekno123}

server:
  port: ${PORT:8086}

payment:
  external:
    auth:
      mode: ${PAYMENT_EXTERNAL_AUTH_MODE:mock}
      base-url: ${PAYMENT_EXTERNAL_AUTH_BASE_URL:http://auth-service:8081}
      jwt-secret: ${PAYMENT_EXTERNAL_AUTH_JWT_SECRET:${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-minimum-32-chars}}
    order:
      mode: ${PAYMENT_EXTERNAL_ORDER_MODE:mock}
      base-url: ${PAYMENT_EXTERNAL_ORDER_BASE_URL:http://order-service:8082}
  simulator:
    vnpay:
      failure-rate: 0.1
      processing-delay-ms: 200
    momo:
      failure-rate: 0.05
      processing-delay-ms: 150
    zalopay:
      failure-rate: 0.08
      processing-delay-ms: 180
    paypal:
      failure-rate: 0.03
      processing-delay-ms: 300
    stripe:
      failure-rate: 0.02
      processing-delay-ms: 100
  timeout:
    default-minutes: 15
    sweep-interval-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.uit.paymentservice: INFO
