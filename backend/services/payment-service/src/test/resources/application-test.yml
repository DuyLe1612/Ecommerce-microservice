spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 5672

payment:
  external:
    auth:
      mode: mock
    order:
      mode: mock
  simulator:
    vnpay:
      failure-rate: 0.0
      processing-delay-ms: 0
    momo:
      failure-rate: 0.0
      processing-delay-ms: 0
    zalopay:
      failure-rate: 0.0
      processing-delay-ms: 0
    paypal:
      failure-rate: 0.0
      processing-delay-ms: 0
    stripe:
      failure-rate: 0.0
      processing-delay-ms: 0
  timeout:
    default-minutes: 15
    sweep-interval-ms: 60000

logging:
  level:
    com.uit.paymentservice: DEBUG
