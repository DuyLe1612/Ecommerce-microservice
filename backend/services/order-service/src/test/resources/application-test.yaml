spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 5672

server:
  port: 8087

order:
  external:
    product:
      mode: mock
      base-url: http://localhost:8080

jwt:
  secret: test-secret-for-order-service
