spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:product_db}
    username: ${DB_USER:tekno}
    password: ${DB_PASSWORD:tekno123}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:tekno}
    password: ${RABBITMQ_PASSWORD:tekno123}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 300000

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:demo}
  api_key: ${CLOUDINARY_API_KEY:dummy}
  api_secret: ${CLOUDINARY_API_SECRET:dummy}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    com.example.product: INFO
  pattern:
    level: "service=product-service traceId=%X{correlationId} %5p"
