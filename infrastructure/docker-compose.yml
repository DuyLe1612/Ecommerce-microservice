name: ecommerce-microservices

services:
  # ── Shared Infrastructure ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: tekno
      POSTGRES_PASSWORD: tekno123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/0-init-multiple-dbs.sql:ro
      - ../backend/services/auth-service/init-data.sql:/docker-entrypoint-initdb.d/1-init-data.sql:ro
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekno -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tekno
      RABBITMQ_DEFAULT_PASS: tekno123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/init-rabbitmq.sh:/docker-entrypoint-initdb.d/init-rabbitmq.sh:ro
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Services ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SERVICE_NAME=auth-service
      - PORT=8081
      - DB_URI=postgresql://tekno:tekno123@postgres:5432/auth_db
      - POSTGRES_USER=tekno
      - POSTGRES_PASSWORD=tekno123
      - POSTGRES_DB=auth_db
      - JWT_SECRET=67948303ff68727a66d36abd88ce6d248bf9bf7c4f4ad98c7b89d84fc71019b0
      - JWT_REFRESH_SECRET=6b89ddaabd0476a190aec107bf9a1ce861520718bf45102fcd83ae84289e7917
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://tekno:tekno123@rabbitmq:5672
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8081,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8081/"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 45s

  product-service:
    build:
      context: ../backend/services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    env_file:
      - ../backend/services/product-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=product_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=tekno
      - RABBITMQ_PASSWORD=tekno123
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  search-service:
    build:
      context: ../backend/services/search-service
      dockerfile: Dockerfile
    container_name: search-service
    env_file:
      - ../backend/services/search-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  promotion-service:
    build:
      context: ../backend/services/promotion-service
      dockerfile: Dockerfile
    container_name: promotion-service
    env_file:
      - ../backend/services/promotion-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  coupon-service:
    build:
      context: ../backend/services/coupon-service
      dockerfile: Dockerfile
    container_name: coupon-service
    env_file:
      - ../backend/services/coupon-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  order-service:
    build:
      context: ../backend/services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8087
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=order_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=tekno
      - RABBITMQ_PASSWORD=tekno123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  payment-service:
    build:
      context: ../backend/services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8086
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=tekno
      - RABBITMQ_PASSWORD=tekno123
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cart-service:
    build:
      context: ../backend/services/cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8088
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cart_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=tekno
      - RABBITMQ_PASSWORD=tekno123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  review-service:
    build:
      context: ../backend/services/review-service
      dockerfile: Dockerfile
    container_name: review-service
    env_file:
      - ../backend/services/review-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: ../backend/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file:
      - ../backend/services/notification-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── API Gateway (nginx) ──────────────────────────────────────────────────────
  # Single nginx gateway handles all routing. No redundant proxy layer.
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "8080:8080"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      # auth-service:
      #   condition: service_healthy
      product-service:
        condition: service_healthy
      # search-service:
      #   condition: service_healthy
      # promotion-service:
      #   condition: service_healthy
      # coupon-service:
      #   condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      # cart-service:
      #   condition: service_healthy
      # review-service:
      #   condition: service_healthy
      # notification-service:
      #   condition: service_healthy
    networks:
      - ecommerce-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ecommerce-net:
    driver: bridge
