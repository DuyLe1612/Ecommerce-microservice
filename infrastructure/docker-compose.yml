name: ecommerce-microservices

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - product-service
      - search-service
      - promotion-service
      - coupon-service
      - order-service
      - payment-service
      - cart-service
      - review-service
      - notification-service
      - promotion-service
      - coupon-service
    networks:
      - ecommerce-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: tekno
      POSTGRES_PASSWORD: tekno123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekno -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tekno
      RABBITMQ_DEFAULT_PASS: tekno123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-service:
    build:
      context: ../backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    env_file:
      - ../backend/services/auth-service/.env.example
    command: sh -c "echo auth-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  product-service:
    build:
      context: ../backend/services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    env_file:
      - ../backend/services/product-service/.env.example
    command: sh -c "echo product-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  search-service:
    build:
      context: ../backend/services/search-service
      dockerfile: Dockerfile
    container_name: search-service
    env_file:
      - ../backend/services/search-service/.env.example
    command: sh -c "echo search-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  promotion-service:
    build:
      context: ../backend/services/promotion-service
      dockerfile: Dockerfile
    container_name: promotion-service
    env_file:
      - ../backend/services/promotion-service/.env.example
    command: sh -c "echo promotion-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  coupon-service:
    build:
      context: ../backend/services/coupon-service
      dockerfile: Dockerfile
    container_name: coupon-service
    env_file:
      - ../backend/services/coupon-service/.env.example
    command: sh -c "echo coupon-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  order-service:
    build:
      context: ../backend/services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    env_file:
      - ../backend/services/order-service/.env.example
    command: sh -c "echo order-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  payment-service:
    build:
      context: ../backend/services/payment-service
      dockerfile: Dockerfile  
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: tekno
      SPRING_DATASOURCE_PASSWORD: tekno123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: tekno
      SPRING_RABBITMQ_PASSWORD: tekno123
      PAYMENT_EXTERNAL_AUTH_MODE: mock
      PAYMENT_EXTERNAL_AUTH_JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-for-jwt-signing-minimum-32-chars}
      PAYMENT_EXTERNAL_ORDER_MODE: mock
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-for-jwt-signing-minimum-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ecommerce-net

  cart-service:
    build:
      context: ../backend/services/cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    env_file:
      - ../backend/services/cart-service/.env.example
    command: sh -c "echo cart-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  review-service:
    build:
      context: ../backend/services/review-service
      dockerfile: Dockerfile
    container_name: review-service
    env_file:
      - ../backend/services/review-service/.env.example
    command: sh -c "echo review-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  notification-service:
    build:
      context: ../backend/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file:
      - ../backend/services/notification-service/.env.example
    command: sh -c "echo notification-service scaffold ready; tail -f /dev/null"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  promotion-service:
    build:
      context: ../backend/services/promotion-service
      dockerfile: Dockerfile
    container_name: promotion-service
    env_file:
      - ../backend/services/promotion-service/.env.example
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

  coupon-service:
    build:
      context: ../backend/services/coupon-service
      dockerfile: Dockerfile
    container_name: coupon-service
    env_file:
      - ../backend/services/coupon-service/.env.example
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ecommerce-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ecommerce-net:
    driver: bridge
