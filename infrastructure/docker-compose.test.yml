name: ecommerce-test

services:
  # ── Shared Infrastructure ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: tekno
      POSTGRES_PASSWORD: tekno123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekno -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tekno
      RABBITMQ_DEFAULT_PASS: tekno123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Backend Services ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SERVICE_NAME=auth-service
      - PORT=8081
      - DB_URI=postgresql://tekno:tekno123@postgres:5432/auth_db
      - POSTGRES_USER=tekno
      - POSTGRES_PASSWORD=tekno123
      - POSTGRES_DB=auth_db
      - JWT_SECRET=67948303ff68727a66d36abd88ce6d248bf9bf7c4f4ad98c7b89d84fc71019b0
      - JWT_REFRESH_SECRET=6b89ddaabd0476a190aec107bf9a1ce861520718bf45102fcd83ae84289e7917
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://tekno:tekno123@rabbitmq:5672
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8081,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8081/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  product-service:
    build:
      context: ../backend/services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=product_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=tekno
      - RABBITMQ_PASSWORD=tekno123
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  order-service:
    build:
      context: ../backend/services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8087
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=order_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=tekno
      - RABBITMQ_PASSWORD=tekno123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  payment-service:
    build:
      context: ../backend/services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8086
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=tekno
      - DB_PASSWORD=tekno123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=tekno
      - RABBITMQ_PASSWORD=tekno123
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── API Gateway (nginx — starts LAST after all upstreams are healthy) ────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ecommerce-test
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ecommerce-test:
    driver: bridge
