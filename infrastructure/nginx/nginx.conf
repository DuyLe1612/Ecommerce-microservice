# Nginx Gateway Configuration for E-Commerce Microservices
# This file is mounted to /etc/nginx/nginx.conf in the container

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with timing metrics
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Client settings
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=50r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Include additional configurations
    include /etc/nginx/conf.d/*.conf;

    # ── Upstream Services ───────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:8080;
        keepalive 32;
    }
    upstream product_service {
        server product-service:8080;
        keepalive 32;
    }
    upstream search_service {
        server search-service:8080;
        keepalive 32;
    }
    upstream promotion_service {
        server promotion-service:8080;
        keepalive 32;
    }
    upstream coupon_service {
        server coupon-service:8080;
        keepalive 32;
    }
    upstream order_service {
        server order-service:8087;
        keepalive 32;
    }
    upstream payment_service {
        server payment-service:8080;
        keepalive 32;
    }
    upstream cart_service {
        server cart-service:8080;
        keepalive 32;
    }
    upstream review_service {
        server review-service:8080;
        keepalive 32;
    }
    upstream notification_service {
        server notification-service:8080;
        keepalive 32;
    }
    upstream gateway_backend {
        server gateway:80;
        keepalive 32;
    }

    # ── Main Server Block ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Apply connection limiting
        limit_conn addr 100;

        # ── Health Check Endpoint ────────────────────────────────────────
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
            access_log off;
        }

        # ── Internal Auth Verification ────────────────────────────────────
        location = /_auth_check {
            internal;
            proxy_pass http://auth_service/internal/auth/verify;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # ── Admin API Routes (Protected) ─────────────────────────────────
        location ^~ /api/admin/ {
            # Uncomment to enable JWT verification at gateway:
            # auth_request /_auth_check;

            # Admin payment routes
            if ($request_uri ~ ^/api/admin/(payments|payment)) {
                proxy_pass http://payment_service;
                break;
            }
            # Admin order routes
            if ($request_uri ~ ^/api/admin/(orders|statistics)) {
                proxy_pass http://order_service;
                break;
            }
            # Admin review routes
            if ($request_uri ~ ^/api/admin/reviews) {
                proxy_pass http://review_service;
                break;
            }
            # Admin coupon routes
            if ($request_uri ~ ^/api/admin/coupons) {
                proxy_pass http://coupon_service;
                break;
            }
            # Admin promotion routes
            if ($request_uri ~ ^/api/admin/(promotions|advertisements)) {
                proxy_pass http://promotion_service;
                break;
            }
            # Admin location import
            if ($request_uri ~ ^/api/admin/locations/import) {
                proxy_pass http://auth_service;
                break;
            }

            # Default admin route to product service
            proxy_pass http://product_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Cart & Wishlist (Protected) ───────────────────────────────────
        location ^~ /api/cart {
            auth_request /_auth_check;
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://cart_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/wishlist {
            auth_request /_auth_check;
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://cart_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── User Profile (Protected) ──────────────────────────────────────
        location ^~ /api/profile {
            auth_request /_auth_check;
            proxy_pass http://auth_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Orders (Protected) ─────────────────────────────────────────────
        location ^~ /api/orders {
            auth_request /_auth_check;
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Payment Processing (Protected) ─────────────────────────────────
        location ^~ /api/payment/process {
            auth_request /_auth_check;
            limit_req zone=payment_limit burst=10 nodelay;
            proxy_pass http://payment_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Public Payment Endpoints ───────────────────────────────────────
        location ^~ /api/payment {
            limit_req zone=payment_limit burst=10 nodelay;
            proxy_pass http://payment_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/v1/payments {
            limit_req zone=payment_limit burst=10 nodelay;
            proxy_pass http://payment_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Simulator Test Endpoints (Demo) ────────────────────────────────
        location ^~ /api/simulator {
            limit_req zone=payment_limit burst=10 nodelay;
            proxy_pass http://payment_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Reviews ────────────────────────────────────────────────────────
        location ~ ^/api/products/[^/]+/reviews {
            proxy_pass http://review_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/review {
            proxy_pass http://review_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Auth Service ───────────────────────────────────────────────────
        location ^~ /api/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://auth_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/locations {
            proxy_pass http://auth_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Product Search & Discovery ─────────────────────────────────────
        location = /api/products {
            proxy_pass http://search_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/products/new {
            proxy_pass http://search_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/products/on-sale {
            proxy_pass http://search_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/recommend {
            proxy_pass http://search_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── General Product Routes ─────────────────────────────────────────
        location ^~ /api/products {
            proxy_pass http://product_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/categories {
            proxy_pass http://product_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/brands {
            proxy_pass http://product_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Coupons ───────────────────────────────────────────────────────
        location ^~ /api/coupons {
            proxy_pass http://coupon_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Promotions & Advertisements ────────────────────────────────────
        location ^~ /api/advertisements {
            proxy_pass http://promotion_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        location ^~ /api/promotions {
            proxy_pass http://promotion_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Blog ──────────────────────────────────────────────────────────
        location ^~ /api/blog {
            proxy_pass http://product_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Cloudinary (File Uploads) ─────────────────────────────────────
        location ^~ /api/cloudinary {
            proxy_pass http://product_service;
            client_max_body_size 50M;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Notifications ──────────────────────────────────────────────────
        location ^~ /api/notifications {
            proxy_pass http://notification_service;
            include /etc/nginx/conf.d/proxy-headers.conf;
        }

        # ── Default / Fallback ─────────────────────────────────────────────
        location / {
            return 404 '{"success": false, "message": "Route not found at gateway"}';
            add_header Content-Type application/json;
        }
    }
}
